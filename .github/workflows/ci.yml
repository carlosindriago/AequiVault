name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-ci:
    name: Backend CI (Spring Boot)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aequivault_user
          POSTGRES_PASSWORD: aequivault_pass
          POSTGRES_DB: aequivault_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw
        working-directory: aequivault/backend

      - name: Build and Test Backend
        run: ./mvnw clean verify
        working-directory: aequivault/backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/aequivault_db?stringtype=unspecified

  frontend-ci:
    name: Frontend CI (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aequivault/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: aequivault/frontend

      - name: Run Tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: aequivault/frontend
