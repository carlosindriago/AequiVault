spring.application.name=backend
server.forward-headers-strategy=framework

# Configuración del Datasource (Inquilino no superusuario para RLS)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/aequivault?stringtype=unspecified}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:aequivault_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:aequivault_app_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Configuración de Liquibase (Superusuario para DDL)
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true
spring.liquibase.user=${SPRING_LIQUIBASE_USER:aequivault_user}
spring.liquibase.password=${SPRING_LIQUIBASE_PASSWORD:aequivault_pass}

security.jwt.secret=${SECURITY_JWT_SECRET:dGVzdC1zZWNyZXQta2V5LXdpdGgtYXQtbGVhc3QtMjU2LWJpdHMtbGVuZ3RoLXNlY3VyZQ==}
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS:86400000}

# Ephemeral public portfolio demo. Disabled by default: when false, /api/demo/start is not registered.
demo.ephemeral.enabled=${ENABLE_EPHEMERAL_DEMO:false}
demo.ephemeral.rate-limit.max-per-hour=${EPHEMERAL_DEMO_RATE_LIMIT_PER_HOUR:2}
demo.ephemeral.gc-rate-ms=${EPHEMERAL_DEMO_GC_RATE_MS:900000}
demo.ephemeral.gc-initial-delay-ms=${EPHEMERAL_DEMO_GC_INITIAL_DELAY_MS:0}
