spring.application.name=backend

# Configuración del Datasource (Inquilino no superusuario para RLS)
spring.datasource.url=jdbc:postgresql://localhost:5433/aequivault?stringtype=unspecified
spring.datasource.username=aequivault_app
spring.datasource.password=aequivault_app_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Configuración de Liquibase (Superusuario para DDL)
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true
spring.liquibase.user=aequivault_user
spring.liquibase.password=aequivault_pass

# Ephemeral public portfolio demo. Disabled by default: when false, /api/demo/start is not registered.
demo.ephemeral.enabled=${ENABLE_EPHEMERAL_DEMO:false}
demo.ephemeral.rate-limit.max-per-hour=${EPHEMERAL_DEMO_RATE_LIMIT_PER_HOUR:2}
demo.ephemeral.gc-rate-ms=${EPHEMERAL_DEMO_GC_RATE_MS:900000}
demo.ephemeral.gc-initial-delay-ms=${EPHEMERAL_DEMO_GC_INITIAL_DELAY_MS:0}
