server {
    listen 80;
    server_name localhost;

    # Generar Nonce criptográfico único por petición
    set $nonce $request_id;

    # CSP Estricto usando el Nonce (Sin 'unsafe-inline' ni 'unsafe-eval')
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-$nonce'; style-src 'self' 'nonce-$nonce'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self';" always;
    
    # Resto de cabeceras de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Inyectar el Nonce en el HTML en tiempo real
        sub_filter '{%NONCE%}' $nonce;
        sub_filter_once off;
        sub_filter_types *;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
}
