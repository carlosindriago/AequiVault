version: '3.8'

services:
  backend:
    build:
      context: ./aequivault/backend
      dockerfile: Dockerfile
    container_name: aequivault-prod-backend
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_LIQUIBASE_USER: ${SPRING_LIQUIBASE_USER}
      SPRING_LIQUIBASE_PASSWORD: ${SPRING_LIQUIBASE_PASSWORD}
      DEMO_EPHEMERAL_ENABLED: ${DEMO_EPHEMERAL_ENABLED:-true}
    networks:
      - app-network
      - coolify
    restart: always

  frontend:
    build:
      context: ./aequivault/frontend
      dockerfile: Dockerfile
    container_name: aequivault-prod-frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app-network
      - coolify
    restart: always

networks:
  app-network:
    driver: bridge
  coolify:
    external: true
